name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build and publish macOS DMG
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        with:
          tagName: v__VERSION__
          releaseName: 8hours v__VERSION__
          releaseBody: |
            8時間＋ポモドーロタイマー＋TODOアプリ、「8hours」のアプリインストーラです。
            LP：https://8hours-lp-one.vercel.app/

            macOS (Apple Silicon) 向け DMG です（アドホック署名、公証なし）。

            **注意:** 有料 Apple Developer Program 未加入のため、初回起動時に Gatekeeper の警告が出る場合があります。
            右クリック →「開く」から起動してください。
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin --bundles dmg
